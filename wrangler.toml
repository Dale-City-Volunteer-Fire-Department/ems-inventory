name = "ems-inventory"
main = "src/worker/index.ts"
compatibility_date = "2026-04-03"

# Environment variables (non-secret)
[vars]
APP_NAME = "EMS Inventory"
ORG_NAME = "Dale City Volunteer Fire Department"

# D1 Database
[[d1_databases]]
binding = "DB"
database_name = "ems-inventory-db"
database_id = "2ab90cd3-01e5-4151-b664-2714da807fe8"
migrations_dir = "migrations"

# KV Namespace (sessions)
[[kv_namespaces]]
binding = "SESSIONS"
id = "37a2d67b1b564b548c882fca5140f3d9"

# Secrets stored via `wrangler secret put` or Cloudflare Dashboard:
#   wrangler secret put AZURE_AD_CLIENT_ID
#   wrangler secret put AZURE_AD_TENANT_ID
#   wrangler secret put STATION_PIN
#   wrangler secret put MAGIC_LINK_SECRET

# Static frontend assets — Worker serves the SPA for non-API paths.
# Build the frontend first: npm run build (runs vite build in src/frontend).
[assets]
directory = "./src/frontend/dist"
binding = "ASSETS"
